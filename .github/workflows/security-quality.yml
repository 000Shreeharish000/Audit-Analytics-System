name: Security and Quality Gate

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Lint
        run: python -m ruff check backend/app backend/tests

      - name: Type check
        run: python -m mypy backend/app

      - name: Security static scan
        run: python -m bandit -q -r backend/app -ll

      - name: Dependency audit
        run: python -m pip_audit -r requirements.txt --ignore-vuln GHSA-7f5h-v6xp-fcq8 --ignore-vuln GHSA-wj6h-64fc-37mp

      - name: Unit tests
        working-directory: backend
        run: python -m pytest -q
